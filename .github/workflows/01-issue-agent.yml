name: 🤖 01 — Issue → Agent

# ═══════════════════════════════════════════════════════════════════════════
# TRIGGER: When an issue receives the "agent-task" label, this workflow
#          automatically invokes the GitHub Copilot Coding Agent by posting
#          a structured comment that assigns the task and provides context.
#
# PIPELINE POSITION:  Issue (labeled) → [THIS WORKFLOW] → Copilot creates PR
# ═══════════════════════════════════════════════════════════════════════════

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  trigger-copilot-agent:
    name: Invoke Copilot Coding Agent
    # Only run when the "agent-task" label is added
    if: github.event.label.name == 'agent-task'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read task specification
        id: read-task
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const issueBody = issue.body || '';

            // Extract task number from issue title (e.g., "[Task-03]" → "03")
            const taskMatch = issueTitle.match(/\[Task[- ]?(\d+)\]/i);
            const taskNumber = taskMatch ? taskMatch[1].padStart(2, '0') : null;

            // Try to read the matching docs/tasks file if it exists
            let taskSpec = '';
            if (taskNumber) {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: `docs/tasks/${taskNumber}-*.md`,
                });
                // If found, include in context (handled below via glob)
              } catch (e) {
                // File not found — use issue body only
              }
            }

            core.setOutput('issue_number', issueNumber);
            core.setOutput('issue_title', issueTitle);
            core.setOutput('task_number', taskNumber || '');

      - name: Post Copilot trigger comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const issueBody = issue.body || '(no description provided)';
            const labels = issue.labels.map(l => l.name);

            // Determine task docs path hint
            const taskMatch = issueTitle.match(/\[Task[- ]?(\d+)\]/i);
            const taskNum = taskMatch ? taskMatch[1].padStart(2, '0') : null;
            const taskDocHint = taskNum
              ? `\n📂 **Detailed specification**: see \`docs/tasks/${taskNum}-*.md\` in the repository for full requirements.`
              : '';

            const comment = [
              `## 🤖 Copilot Coding Agent — Task Assignment`,
              ``,
              `@github-copilot Please implement the following task as described in this issue.`,
              ``,
              `### Task: ${issueTitle}`,
              ``,
              `### Requirements`,
              issueBody,
              taskDocHint,
              ``,
              `### Architecture Guidelines`,
              `Follow the architecture and coding standards defined in \`.github/copilot-instructions.md\`.`,
              ``,
              `### Expected Deliverables`,
              `- [ ] All functional requirements implemented (no partial implementations)`,
              `- [ ] Unit tests written alongside implementation (≥ 80% coverage on new code)`,
              `- [ ] Docker Compose environment still starts successfully end-to-end`,
              `- [ ] Pull request opened with title: \`[Task-${taskNum || issue.number}] ${issueTitle.replace(/\[Task-?\d+\]\s*/i, '')}\``,
              `- [ ] PR description includes \`Closes #${issueNumber}\``,
              ``,
              `### Branch Naming`,
              `Create your branch as: \`feature/task-${taskNum || issue.number}-${issueTitle.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 40)}\``,
              ``,
              `---`,
              `*This comment was automatically generated by the Issue Agent workflow.*`,
              `*Pipeline: Issue → Agent → PR → Tests → Auto-Merge*`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment,
            });

            // Also add "in-progress" label to track state
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['agent-in-progress'],
            }).catch(() => {
              // Label may not exist yet — ignore
            });

            console.log(`✅ Copilot trigger comment posted on issue #${issueNumber}`);
